<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Monitor Web</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="grain"></div>
    <main class="shell">
      <section class="hero" id="hero"></section>
      <section class="filters card" id="filters"></section>
      <section class="warning-stack" id="warnings"></section>
      <section class="grid">
        <article class="card board-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Primary View</p>
              <h2>Project Board</h2>
            </div>
            <p class="panel-note">작업 상태와 책임 구조를 한 번에 본다.</p>
          </div>
          <div id="board"></div>
        </article>
        <article class="card blocker-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Immediate Attention</p>
              <h2>Blocker / Approval Queue</h2>
            </div>
          </div>
          <div id="blockers"></div>
        </article>
        <article class="card activity-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Latest Delta</p>
              <h2>Recent Activity</h2>
            </div>
          </div>
          <div id="activity"></div>
        </article>
        <article class="card health-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Integrity</p>
              <h2>Document Health</h2>
            </div>
          </div>
          <div id="health"></div>
        </article>
        <article class="card team-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Directory</p>
              <h2>Team Registry</h2>
            </div>
          </div>
          <div id="team"></div>
        </article>
      </section>
    </main>

    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer-scrim" data-close-drawer="true"></div>
      <div class="drawer-panel">
        <button class="drawer-close" type="button" data-close-drawer="true">
          Close
        </button>
        <p class="eyebrow drawer-eyebrow">Detail</p>
        <h2 class="drawer-title" id="drawer-title">Detail</h2>
        <div id="drawer-content"></div>
      </div>
    </aside>

    <script type="module" src="/app.js"></script>
  </body>
</html>
