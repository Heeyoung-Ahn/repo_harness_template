<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Monitor Web</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="ambient-grid" aria-hidden="true"></div>
    <div class="ambient-orb ambient-orb-left" aria-hidden="true"></div>
    <div class="ambient-orb ambient-orb-right" aria-hidden="true"></div>

    <main class="shell">
      <header class="app-header card" id="app-header"></header>
      <section class="warning-stack" id="warnings"></section>

      <section class="workspace">
        <aside class="workspace-sidebar" id="navigation"></aside>

        <section class="workspace-main">
          <section class="dashboard-grid" id="dashboard"></section>

          <section class="content-shell card">
            <div class="content-head">
              <div>
                <p class="eyebrow">Content Area</p>
                <h2 id="content-heading">Project Overview</h2>
              </div>
              <p class="content-meta" id="content-meta"></p>
            </div>
            <div class="content-scroll" id="content"></div>
          </section>
        </section>
      </section>
    </main>

    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer-scrim" data-close-drawer="true"></div>
      <div class="drawer-panel">
        <button class="drawer-close" type="button" data-close-drawer="true">
          Close
        </button>
        <p class="eyebrow drawer-eyebrow">Detail Drawer</p>
        <h2 class="drawer-title" id="drawer-title">Detail</h2>
        <div id="drawer-content"></div>
      </div>
    </aside>

    <script type="module" src="/app.js"></script>
  </body>
</html>
